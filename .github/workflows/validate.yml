name: validate

on:
  push:
  pull_request:

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate examples
        run: python scripts/make_minimal_examples.py
      - name: Validate artifacts
        run: bash scripts/validate_artifacts.sh examples
